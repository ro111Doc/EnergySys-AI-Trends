version: "0.1"
query_id: "QRY-V0-2026-03-26"
project_name: "bibliometrics_lstm_load_forecasting"
author_role: "A"
status: "draft"
last_updated: "2026-03-26"

topic:
  chinese_title: "基于LSTM的电力负荷预测研究热点与发展趋势——文献计量分析（2015–2025）"
  english_title: "Research hotspots and development trends of LSTM in electric load forecasting: a bibliometric analysis (2015-2025)"
  research_goal: "识别2015–2025年LSTM在电力负荷预测领域的研究热点、主题演化与发展趋势"

query_design:
  logic: "method AND task AND context NOT exclusion"
  design_principle:
    - "方法词用于限定LSTM及其相关模型"
    - "任务词用于限定电力负荷预测主题"
    - "场景词用于提高电力领域检索精度"
    - "排除词用于剔除明显无关领域"
    - "V0版本优先保证结构清晰、便于解释和后续迭代"

term_groups:
  method_terms:
    chinese:
      - "LSTM"
      - "长短期记忆网络"
      - "长短时记忆网络"
      - "双向长短期记忆网络"
      - "BiLSTM"
      - "注意力机制LSTM"
    english:
      - "LSTM"
      - "bidirectional LSTM"
      - "attention LSTM"

  task_terms:
    chinese:
      - "电力负荷预测"
      - "负荷预测"
      - "短期负荷预测"
      - "电力需求预测"
    english:
      - "load forecasting"
      - "load prediction"
      - "electric load forecasting"
      - "power load forecasting"
      - "electricity demand forecasting"
      - "short-term load forecasting"
      - "STLF"

  context_terms:
    chinese:
      - "电力系统"
      - "智能电网"
      - "电网"
      - "配电网"
    english:
      - "power system"
      - "power systems"
      - "smart grid"
      - "power grid"
      - "distribution network"

  exclusion_terms:
    chinese:
      - "交通流预测"
      - "网络流量预测"
      - "服务器负载预测"
      - "CPU负载预测"
      - "桥梁荷载预测"
    english:
      - "traffic flow forecasting"
      - "network traffic forecasting"
      - "server workload prediction"
      - "CPU load prediction"
      - "bridge load prediction"

search_expression:
  display_version: >
    （LSTM OR 长短期记忆网络 OR 长短时记忆网络 OR 双向长短期记忆网络 OR BiLSTM OR bidirectional LSTM OR 注意力机制LSTM OR attention LSTM）
    AND
    （电力负荷预测 OR 负荷预测 OR 短期负荷预测 OR 电力需求预测 OR load forecasting OR load prediction OR electric load forecasting OR power load forecasting OR electricity demand forecasting OR short-term load forecasting OR STLF）
    AND
    （电力系统 OR 智能电网 OR 电网 OR 配电网 OR power system OR power systems OR smart grid OR power grid OR distribution network）
    NOT
    （交通流预测 OR 网络流量预测 OR 服务器负载预测 OR CPU负载预测 OR 桥梁荷载预测 OR traffic flow forecasting OR network traffic forecasting OR server workload prediction OR CPU load prediction OR bridge load prediction）

  normalized_version: >
    (
      "LSTM" OR "长短期记忆网络" OR "长短时记忆网络" OR "双向长短期记忆网络" OR
      "BiLSTM" OR "bidirectional LSTM" OR "注意力机制LSTM" OR "attention LSTM"
    )
    AND
    (
      "电力负荷预测" OR "负荷预测" OR "短期负荷预测" OR "电力需求预测" OR
      "load forecasting" OR "load prediction" OR "electric load forecasting" OR
      "power load forecasting" OR "electricity demand forecasting" OR
      "short-term load forecasting" OR "STLF"
    )
    AND
    (
      "电力系统" OR "智能电网" OR "电网" OR "配电网" OR
      "power system" OR "power systems" OR "smart grid" OR
      "power grid" OR "distribution network"
    )
    NOT
    (
      "交通流预测" OR "网络流量预测" OR "服务器负载预测" OR "CPU负载预测" OR "桥梁荷载预测" OR
      "traffic flow forecasting" OR "network traffic forecasting" OR
      "server workload prediction" OR "CPU load prediction" OR "bridge load prediction"
    )

constraints:
  year_range:
    start: 2015
    end: 2025
  languages:
    - "Chinese"
    - "English"
  document_types:
    chinese:
      - "期刊论文"
      - "学位论文"
    english:
      - "Article"
      - "Review"
  search_fields:
    chinese:
      - "篇名"
      - "摘要"
      - "关键词"
    english:
      - "title"
      - "abstract"
      - "keywords"

database_targets:
  primary_databases:
    chinese:
      - "CNKI"
      - "WanFang"
      - "VIP"
    english:
      - "Web of Science Core Collection"
      - "Scopus"
  recommended_primary_database: "CNKI"

screening_plan:
  initial_sampling:
    sample_size: 10
    check_items:
      - "是否属于电力负荷预测领域"
      - "是否以LSTM或其相关变体为主要方法"
      - "是否误检到交通流、网络流量、服务器负载等领域"
      - "题名、摘要、关键词是否至少命中两个概念组"
  relevance_goal: "前10条中至少7条为高度相关文献"
  adjustment_rule:
    - "若误检过多，则优先补充场景词或增强排除词"
    - "若漏检明显，则优先扩充任务词与方法词同义表达"
    - "若中文检索效果优于英文，则中文版本优先作为主检索式"

change_log:
  - version: "0.1"
    date: "2026-03-26"
    changes:
      - "建立method-task-context-exclusion四层结构"
      - "完成中英文混合版V0检索式"
      - "加入时间、语言、文献类型和字段限定"
    reason: "满足课程前期Query as Code要求，先形成可复现的初始版本"

usage_notes:
  - "本文件为V0版本，适合课程作业展示、仓库记录和后续修改。"
  - "中英文混合版用于统一口径，实际数据库检索时可拆分为中文检索式和英文检索式。"
  - "V0版本不追求一次性最全，而追求可解释、可修改、可追踪。"
  - "后续若进行正式检索，建议先在CNKI试搜，再决定是否补充英文数据库。"
